<!DOCTYPE html>
   <head>
      <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
      <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Humeos</title>
      {%block title%}{%endblock%}
      <style>
         .hub-info {
            font-size: 0.9em;
            color: #666;
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
         }
         .hub-info-line {
            display: flex;
            gap: 10px;
            margin: 2px 0;
         }
         .hub-info span {
            margin: 0 5px;
         }
         button {
             margin-bottom: 5px !important;
         }
         button[disabled] {
            background: grey !important;
            border-color: grey !important;            
        }
      </style>
   </head>
   <body>         
<nav class="navbar navbar-expand-lg navbar-light bg-light">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav"> 
                                         
                        <a class="nav-link" href="/"> <img src="{{url_for('static',filename='Humeos_logotype_RGB_small.png')}}" height="60" align="left"/> <span class="visually-hidden">(current)</span></a>
                        <a class="nav-link" href="/Hub"><button type="button" class="btn btn-secondary btn-lg">Hub</button></a> 
                        <a class="nav-link" href="/Scanner/1"><button type="button" class="btn btn-secondary btn-lg">Scanner-1</button></a>
                        <a class="nav-link" href="/Scanner/2"><button type="button" class="btn btn-secondary btn-lg">Scanner-2</button></a> 
                        <a class="nav-link" href="/Scanner/3"><button type="button" class="btn btn-secondary btn-lg">Scanner-3</button></a>                        
                        <a class="nav-link" href="/App"><button type="button" class="btn btn-secondary btn-lg">App</button></a>
                        <a class="nav-link" href="/Tests"><button type="button" class="btn btn-secondary btn-lg">Tests</button></a>
                        <a class="nav-link"><button type="button" class="btn btn-danger btn-lg" id="poweroff-btn">Poweroff</button></a> 
                                              
            </div>
      </div>     
      <div class="hub-info">
         <div class="hub-info-line">
            <span>Battery: {{ "%.2f"|format(hub_info[0]) }}V ({{hub_info[1]}}%)</span>
            <span>USB: {{ hub_info[2]|int }}MB ({{ hub_info[3]|int }}%)</span>
            <span>Temp: {{ "%.1f"|format(hub_info[4]) }}°C</span>
         </div>
         <div class="hub-info-line">
            <span>IP: {{ IP }}</span>
            <span>SSID: {{ SSID }}</span>
            <span>SSH: {{ SSH_PORT }}</span>
            <span>Version: {{ version }}</span>
         </div>
      </div>
</nav>

{%block content%}{%endblock%}   
                  
          
      <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
      
      <script>
      // Add JavaScript for the Poweroff button
      document.getElementById('poweroff-btn').addEventListener('click', function() {
          if (confirm('Are you sure you want to power off the Hub?')) {
              fetch("{{url_for('stop_server')}}", {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json'
                  }
              }).then(response => {
                  if (response.ok) {
                      alert('Hub is powering off...');
                  } else {
                      alert('Error powering off the Hub');
                  }
              }).catch(error => {
                  alert('Error powering off the Hub: ' + error);
              });
          }
      });
      </script>
   </body>   
</html>
