{% extends "base.html" %}
{%block content%}
<div class="container">
  <!-- Content here -->  
	<H1>Hub Configuration</H1>	
	<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ hub_config }}</pre>
	
	<form action = "{{url_for('update_version')}}" method = "get">
		<button type="submit" class="btn btn-primary">Update version</button>
	</form>
	{% if update_output %}
	<div class="mt-3">
		<h4>Update Output:</h4>
		<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ update_output }}</pre>
	</div>
	{% endif %}
</div>        
{%endblock%}
