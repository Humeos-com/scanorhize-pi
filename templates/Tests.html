{% extends "base.html" %}
{%block content%}

<div class="container">
    <h1>Tests</h1>

    <!-- =========================
         MASTER TEST CONTROLS
    ========================== -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Master</h4>
        </div>

        <div class="card-body">
            <!-- Runs every test sequentially -->
            <button class="btn btn-primary me-2 run-test-btn run-all-btn"
                    onclick="runAll()">
                Run all
            </button>
        </div>
    </div>

    <!-- =========================
        POWER MANAGEMENT TESTS
    ========================== -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Power Management</h4>
        </div>

        <div class="card-body">
            <!-- Battery voltage and current from WittyPi -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('battery', true)">
                Battery
            </button>

            <!-- Victron MPPT status via VE.Direct -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('mppt', true)">
                ☀ Solar MPPT
            </button>
        </div>
    </div>

    <!-- =========================
        CONNECTIVITY TESTS
    ========================== -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Connectivity</h4>
        </div>

        <div class="card-body">
            <!-- 4G modem detection and connection state -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('4g', true)">
                4G Modem
            </button>

            <!-- Internet connectivity test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('internet', true)">
                Internet
            </button>

            <!-- AWS S3 bucket accessibility test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('s3', true)">
                S3 Bucket
            </button>

            <!-- SSH tunnel availability test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('ssh', true)">
                SSH Tunnel
            </button>

            <!-- Upload pictures service test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('upload-pictures-service', true)">
                ⬆ Upload pictures service
            </button>

            <!-- Download/upload speed test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('speed', true)">
                ⬇⬆ Speed test
            </button>
        </div>
    </div>

    <!-- =========================
        SCANNER TESTS
    ========================== -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Scanners</h4>
        </div>

        <div class="card-body">
            <!-- Scanner hardware test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('scanners-config-files', true)">
                Scanners
            </button>

            <!-- Trigger a forced acquisition on all scanners -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('take-pictures', true)">
                Take pictures
            </button>
        </div>
    </div>

    <!-- =========================
        TIME TESTS
    ========================== -->
    <div class="card mb-4">
        <div class="card-header">
            <h4>Time Management</h4>
        </div>

        <div class="card-body">
            <!-- System timezone check: must be UTC -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('timezone', true)">
                Timezone (UTC)
            </button>

            <!-- WittyPi I2C connectivity + next wakeup/shutdown times -->
            <button class="btn btn-primary me-2 run-test-btn"
                    onclick="runTest('wittypi', true)">
                WittyPi
            </button>

            <!-- Full shutdown/wakeup cycle test: programs WittyPi, monitors countdown, pings after reboot -->
            <button class="btn btn-warning me-2 run-test-btn"
                    onclick="runTest('wittypi-cycle', true)">
                WittyPi Cycle
            </button>

            <!-- WittyPi I2C connectivity + next wakeup/shutdown times -->
            <!-- Hidden button, to be tirggered after wakeup when running complete test -->
            <button class="btn btn-primary me-2 run-test-btn"
                    style="display: none;"
                    onclick="runTest('wittypi', true)">
                WittyPi
            </button>
        </div>
    </div>



    <!-- =========================
        TEST RESULTS OUTPUT
    ========================== -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Results</h4>
            <div>
                <button class="btn btn-secondary btn-sm me-2"
                        onclick="document.getElementById('test-output').innerHTML = ''">
                    Clear
                </button>
                <!-- Visible only while a test is running; aborts the in-flight request -->
                <button class="btn btn-danger btn-sm" id="stop-btn"
                        onclick="stopTests()"
                        style="display:none;">
                    Stop
                </button>
            </div>
        </div>

        <div class="card-body" style="padding: 0;">

            <!-- Console-like output area -->
            <pre id="test-output"
                 class="bg-dark p-3"
                 style="min-height: 100px;
                        max-height: 90dvh;
                        overflow-y: auto;
                        white-space: pre-wrap;
                        color: white;
                        margin-bottom:0;">
            </pre>

        </div>
    </div>
</div>

<script>

document.getElementById('test-output').innerHTML = ""

/* =========================================================
   HELPERS
========================================================= */

function fmtUTC(d) {
    return d.toISOString().slice(11, 19);
}

/* =========================================================
   GLOBAL STATE
========================================================= */

// Task ID of the currently running async backend job
let currentTaskId = null

// True when "Run all" mode is active
let runningAll = false

// Currently running button element
let runningTestBtn

// Stores summary results for all tests
let allTestResults = ""

// AbortController for cancelling the in-flight fetch request
let abortController = null

// Interval ID and pending ping timeout for the wittypi-cycle monitor
let cycleMonitorInterval = null
let cycleMonitorPingTimeout = null

// Polling interval for job status
let testPollInterval = null

// Live "waiting" span shown while polling, and its accumulated dot count
let pollWaitingEl = null
let pollDots = 0

// Last printed IN PROGRESS message — suppresses duplicate lines
let lastProgressMessage = null

// Timestamp (ms) when the current test started
let testStartTime = null


/* =========================================================
   RUN ALL TESTS
========================================================= */

function runAll() {
    allTestResults = ""
    runningAll = true
    runningTestBtn = document.querySelector('.run-test-btn:not(.run-all-btn)');
    runningTestBtn.click();
}


/* =========================================================
   RESET BUTTON STATES
========================================================= */

function initTestButtonStates() {
    const testButtons = document.querySelectorAll('.run-test-btn');
    testButtons.forEach(button => { button.disabled = false; });
    document.getElementById('stop-btn').style.display = 'none';
    runningTestBtn = null
    runningAll = false
}


/* =========================================================
   STOP RUNNING TEST
========================================================= */

function stopTests() {
    const output = document.getElementById('test-output');
    const isCycleRunning = cycleMonitorInterval !== null;
    const testIsRunning = document.getElementById('stop-btn').style.display !== 'none';

    if (abortController) abortController.abort();
    if (testPollInterval) { clearInterval(testPollInterval); testPollInterval = null; }
    if (pollWaitingEl) { pollWaitingEl.remove(); pollWaitingEl = null; }

    // Cancel the backend job so long-running loops (e.g. take-pictures) stop between iterations
    if (currentTaskId) {
        fetch('/tests/cancel/' + currentTaskId, { method: 'POST' }).catch(() => {});
        currentTaskId = null;
    }

    // Show STOPPED for normal tests — covers all timing cases (in-flight, between ticks, 2s gap)
    // The cycle monitor shows its own STOPPED message below
    if (testIsRunning && !isCycleRunning) {
        const now = fmtUTC(new Date());
        output.insertAdjacentHTML('beforeend', `<br>[${now}] <b style="color:orange;">⏹ STOPPED</b><hr>`);
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;
    }

    if (isCycleRunning) {
        clearInterval(cycleMonitorInterval);
        cycleMonitorInterval = null;
        if (cycleMonitorPingTimeout) {
            clearTimeout(cycleMonitorPingTimeout);
            cycleMonitorPingTimeout = null;
        }
        const reconnectHint = document.getElementById('cycle-reconnect');
        if (reconnectHint) reconnectHint.remove();
        window.retryWittypiCyclePing = null;
        const now = fmtUTC(new Date());
        output.insertAdjacentHTML('beforeend', `<br>[${now}] <b style="color:orange;">⏹ STOPPED</b>`);
        // Try to cancel on Pi side; Pi may already be off.
        // Keep buttons disabled until cancel finishes to prevent concurrent I2C access.
        fetch('/tests/run/wittypi-cycle-cancel')
            .then(r => r.json())
            .then(({ task_id }) => pollForCancel(task_id, output, initTestButtonStates))
            .catch(() => {
                const ts = fmtUTC(new Date());
                output.insertAdjacentHTML('beforeend', `<br>[${ts}] Pi already unreachable — cancel skipped.<hr>`);
                document.documentElement.scrollTop = document.documentElement.scrollHeight;
                output.scrollTop = output.scrollHeight;
                initTestButtonStates();
            });
        return; // buttons re-enabled by initTestButtonStates callback above
    }

    initTestButtonStates();
}

function pollForCancel(taskId, output, onDone) {
    const interval = setInterval(() => {
        fetch('/tests/status/' + taskId)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'running') return;
                clearInterval(interval);
                const ts = fmtUTC(new Date());
                output.insertAdjacentHTML('beforeend', `<br>[${ts}] ${data.message}<hr>`);
                document.documentElement.scrollTop = document.documentElement.scrollHeight;
                output.scrollTop = output.scrollHeight;
                if (onDone) onDone();
            })
            .catch(() => {
                clearInterval(interval);
                const ts = fmtUTC(new Date());
                output.insertAdjacentHTML('beforeend', `<br>[${ts}] Pi already unreachable — cancel skipped.<hr>`);
                document.documentElement.scrollTop = document.documentElement.scrollHeight;
                output.scrollTop = output.scrollHeight;
                if (onDone) onDone();
            });
    }, 1000);
}


/* =========================================================
   RUN SINGLE TEST
========================================================= */

function runTest(testName, showTestName) {

    // Disable all buttons while a test runs
    const testButtons = document.querySelectorAll('.run-test-btn');
    testButtons.forEach(button => { button.disabled = true; });

    // Show stop button and arm a fresh AbortController
    document.getElementById('stop-btn').style.display = 'inline-block';
    abortController = new AbortController();

    const output = document.getElementById('test-output');
    const now = fmtUTC(new Date());

    if (showTestName) {
        testStartTime = Date.now();
        const displayName = testName.replace(/-/g, ' ').toUpperCase();
        output.innerHTML += `[${now}] Running <b>${displayName}</b> test...`
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;
    }

    // Ask backend to start the job — returns task_id immediately
    fetch('/tests/run/' + testName, { signal: abortController.signal })
        .then(response => {
            if (response.status === 409) {
                return response.json().then(data => { throw new Error('already running — wait for it to finish'); });
            }
            return response.json();
        })
        .then(({ task_id }) => {
            startPolling(task_id);
        })
        .catch(error => {
            if (error.name !== 'AbortError') {
                const now = fmtUTC(new Date());
                output.innerHTML += `<br>[${now}] <b style="color:orange;">⚠ ${error.message || error}</b><hr>`;
                document.documentElement.scrollTop = document.documentElement.scrollHeight;
                output.scrollTop = output.scrollHeight;
            }
            // AbortError: stopTests() already showed STOPPED
            initTestButtonStates();
        });
}


/* =========================================================
   POLL JOB STATUS
========================================================= */

function startPolling(taskId) {
    currentTaskId = taskId;
    let messagesSeen = 0;
    const output = document.getElementById('test-output');

    // Reuse existing span when chaining processing steps so dots keep accumulating;
    // create a fresh one only at the start of a new test
    if (!pollWaitingEl) {
        output.insertAdjacentHTML('beforeend', '<span></span>');
        pollWaitingEl = output.lastElementChild;
        pollDots = 0;
    }

    if (testPollInterval) clearInterval(testPollInterval);
    testPollInterval = setInterval(() => {
        pollDots++;
        pollWaitingEl.innerHTML = `<br>[${fmtUTC(new Date())}] ${'.'.repeat(pollDots)}`;

        fetch('/tests/status/' + taskId, { signal: abortController.signal })
            .then(r => r.json())
            .then(data => {
                // Insert intermediate messages before the waiting span so it stays last
                const messages = data.messages || [];
                for (let i = messagesSeen; i < messages.length; i++) {
                    const ts = fmtUTC(new Date());
                    pollWaitingEl.insertAdjacentHTML('beforebegin', `<br>[${ts}] ${messages[i]}`);
                }
                if (messages.length > messagesSeen) {
                    messagesSeen = messages.length;
                    document.documentElement.scrollTop = document.documentElement.scrollHeight;
                    output.scrollTop = output.scrollHeight;
                }

                if (data.status === 'running') return;
                clearInterval(testPollInterval);
                testPollInterval = null;
                handleTestResult(data);
            })
            .catch(error => {
                clearInterval(testPollInterval);
                testPollInterval = null;
                if (pollWaitingEl) { pollWaitingEl.remove(); pollWaitingEl = null; }
                if (error.name !== 'AbortError') {
                    const now = fmtUTC(new Date());
                    output.insertAdjacentHTML('beforeend', `<br>[${now}] <b style="color:red;">✘ ERROR</b>: ${error}<hr>`);
                    document.documentElement.scrollTop = document.documentElement.scrollHeight;
                    output.scrollTop = output.scrollHeight;
                }
                // AbortError: stopTests() already showed STOPPED
                initTestButtonStates();
            });
    }, 1000);
}


/* =========================================================
   HANDLE TEST RESULT
========================================================= */

function handleTestResult(data) {
    const output = document.getElementById('test-output');
    const now = fmtUTC(new Date());
    let contentInserted = false;

    // Keep the waiting span alive only while chaining through processing steps
    const keepSpan = data.processing && !!data.next_test;
    if (!keepSpan && pollWaitingEl) {
        pollWaitingEl.remove();
        pollWaitingEl = null;
    }

    // Helper: insert a line, keeping the waiting span last if still alive
    function insert(html) {
        contentInserted = true;
        if (pollWaitingEl) {
            pollWaitingEl.insertAdjacentHTML('beforebegin', html);
        } else {
            output.insertAdjacentHTML('beforeend', html);
        }
    }

    if (data.processing) {
        if (data.message !== lastProgressMessage) {
            lastProgressMessage = data.message;
            insert(`<br>[${now}] <b style="color:orange;">⌛ IN PROGRESS</b>: ${data.message}`);
        }
    } else {
        lastProgressMessage = null;
        const isFinal = !data.next_test && !data.shutdown_at;
        const duration = isFinal && testStartTime
            ? ` <span style="color:gray;">(${((Date.now() - testStartTime) / 1000).toFixed(1)}s)</span>`
            : '';
        if (data.panel_disconnected) {
            insert(`<br>[${now}] <b style="color:orange;">⌛ PENDING</b>: ${data.message}${duration}`);
        } else {
            insert(`<br>[${now}] ${data.ok ? '<b style="color:green;">✔ PASS</b>' : '<b style="color:red;">✘ FAIL</b>'}: ${data.message}${duration}`);
        }
    }

    // WittyPi cycle test — hand off to cycle monitor
    if (data.shutdown_at && data.wakeup_at) {
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;
        runWittypiCycleMonitor(data.shutdown_at, data.wakeup_at, output, now);
        return;
    }

    if (runningAll == true) {
        if (data.summary) allTestResults += `<br>         → ${data.summary}`;
    } else if (data.next_test == null) {
        initTestButtonStates();
    }

    // Multi-step test: chain to next step
    if (data.next_test) {
        runTest(data.next_test, false);
    } else if (data.panel_disconnected) {
        showPanelDisconnectedPrompt(data, output);
    } else {
        output.insertAdjacentHTML('beforeend', '<hr>');

        if (data.ok && runningAll == true && runningTestBtn) {
            const runTestButtons = [...document.querySelectorAll('.run-test-btn:not(.run-all-btn)')];
            runningTestBtn = runTestButtons[runTestButtons.indexOf(runningTestBtn) + 1] || null;

            if (runningTestBtn) {
                setTimeout(() => {
                    runningTestBtn.disabled = false;
                    runningTestBtn.click();
                    runningTestBtn.disabled = true;
                }, 2000);
            } else {
                initTestButtonStates();
                output.insertAdjacentHTML('beforeend', `<br>[${now}] <b style="color:green;">🙌 SUCCESS: </b>${allTestResults}`);
            }
        } else {
            initTestButtonStates();
        }
    }

    if (contentInserted) {
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;
    }
}

/* =========================================================
   WITTYPI CYCLE MONITOR
   Runs entirely in the browser after the backend schedules
   the WittyPi shutdown/wakeup.  Phases:
     1. Countdown to shutdown
     2. Countdown to wakeup  (Pi is off during this phase)
     3. Ping /tests/run/ping every 10s until reply or 30s timeout
========================================================= */

function runWittypiCycleMonitor(shutdownAt, wakeupAt, output, startNow) {

    const shutdownTime = new Date(shutdownAt);
    const wakeupTime   = new Date(wakeupAt);

    // Live status line — insertAdjacentHTML keeps existing DOM references valid
    output.insertAdjacentHTML('beforeend', '<br><span></span>');
    const statusEl = output.lastElementChild;

    // Phase state machine: shutdown → wakeup → booting → pinging-silent → pinging → done
    let phase = 'shutdown';
    let pingDeadline = null;       // deadline for the 'pinging' phase (after reconnect hint)
    let bootingEndTime = null;     // when the 15s boot wait ends
    let silentPingDeadline = null; // deadline for the 'pinging-silent' phase
    let pingActive = false;        // false when paused waiting for Retry click

    // Format milliseconds as "Xm Ys" or "Ys"
    function fmt(ms) {
        const s = Math.max(0, Math.ceil(ms / 1000));
        const m = Math.floor(s / 60);
        return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
    }

    // 1-second tick: update status line and drive phase transitions
    cycleMonitorInterval = setInterval(() => {

        const now = new Date();

        // Phase 1: countdown until WittyPi shuts the Pi down
        if (phase === 'shutdown') {
            const left = shutdownTime - now;
            if (left > 0) {
                statusEl.innerHTML = `⏱ Waiting for shutdown… <b>${fmt(left)}</b> remaining`;
            } else {
                phase = 'wakeup';
            }

        // Phase 2: Pi is off — count down to scheduled wakeup
        } else if (phase === 'wakeup') {
            const left = wakeupTime - now;
            if (left > 0) {
                statusEl.innerHTML = `🔴 Pi is off. Wakeup in <b>${fmt(left)}</b> - <span style="background: red; color: white; border-radius: 5px; filter: drop-shadow(3px 3px 3px #555); padding: 0px 5px;">DO NOT RELOAD THE PAGE!</span>`;
            } else {
                phase = 'booting';
                bootingEndTime = new Date(wakeupTime.getTime() + 25*1000);
            }

        // Phase 3: fixed 25s wait for the Pi to finish booting
        } else if (phase === 'booting') {
            const bootLeft = Math.max(0, Math.ceil((bootingEndTime - now) / 1000));
            statusEl.innerHTML = `🟡 Waiting for Pi to boot up… <b>${bootLeft}s</b>`;
            if (now >= bootingEndTime) {
                phase = 'pinging-silent';
                silentPingDeadline = new Date(Date.now() + 20*1000);
                pingActive = true;
                doPing();
            }

        // Phase 4: auto-ping every 5s for 20s — no reconnect prompt yet
        } else if (phase === 'pinging-silent') {
            statusEl.innerHTML = `🔍 Pinging server…`;
            if (now >= silentPingDeadline) {
                // Silent phase expired without reply — show reconnect hint and pause pinging
                phase = 'pinging';
                pingDeadline = new Date(Date.now() + 30*1000);
                pingActive = false;
                if (cycleMonitorPingTimeout) { clearTimeout(cycleMonitorPingTimeout); cycleMonitorPingTimeout = null; }
                output.insertAdjacentHTML('beforeend', `<br><span id="cycle-reconnect">⚠ Lost WiFi? Reconnect to <b>Scanorhize_Hub</b>, then click 👉 <button class="btn btn-sm btn-outline-warning" onclick="retryWittypiCyclePing()">Retry ping</button></span>`);
                scrollToBottom();
                // Retry button: resets 30s deadline and resumes pinging
                window.retryWittypiCyclePing = function() {
                    if (phase !== 'pinging') return;
                    pingDeadline = new Date(Date.now() + 30*1000);
                    pingActive = true;
                    if (cycleMonitorPingTimeout) { clearTimeout(cycleMonitorPingTimeout); cycleMonitorPingTimeout = null; }
                    statusEl.innerHTML = `🔍 Retrying — pinging server…`;
                    doPing();
                };
            }

        // Phase 5: pinging paused — waiting for Retry click; fail if 30s deadline expires
        } else if (phase === 'pinging') {
            const left = pingDeadline - now;
            if (left <= 0) {
                finish(false, 'No reply from server within 30s.');
            }
        }

    }, 1000);

    /* -------------------------------------------------
       PING HELPERS
    ------------------------------------------------- */

    function scrollToBottom() {
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;
    }

    // Send one ping; on failure schedule the next one if pingActive
    function doPing() {
        const pingStart = new Date();
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000); // 3s timeout
        output.insertAdjacentHTML('beforeend', `<br>[${fmtUTC(pingStart)}] 🔍 Ping…`);
        scrollToBottom();
        fetch('/tests/ping', { signal: controller.signal })
            .then(r => { clearTimeout(timeoutId); return r.json(); })
            .then(d => {
                const rtt = Math.round(new Date() - pingStart);
                if (d.ok) {
                    output.insertAdjacentHTML('beforeend', `<br>[${fmtUTC(new Date())}] 🟢 Ping OK (${rtt}ms)`);
                    scrollToBottom();
                    finish(true, "");
                } else {
                    output.insertAdjacentHTML('beforeend', `<br>[${fmtUTC(new Date())}] 🔴 Ping failed (${rtt}ms)`);
                    scrollToBottom();
                    scheduleNextPing();
                }
            })
            .catch(() => {
                clearTimeout(timeoutId);
                const rtt = Math.round(new Date() - pingStart);
                output.insertAdjacentHTML('beforeend', `<br>[${fmtUTC(new Date())}] 🔴 Ping unreachable (${rtt}ms)`);
                scrollToBottom();
                scheduleNextPing();
            });
    }

    // Schedule the next ping in 5s — only if pinging is active and deadline not passed
    function scheduleNextPing() {
        if (!pingActive) return;  // paused — waiting for Retry click
        const deadline = phase === 'pinging-silent' ? silentPingDeadline : pingDeadline;
        if (deadline && new Date() < deadline) {
            cycleMonitorPingTimeout = setTimeout(doPing, 5000);
        }
    }

    function finish(ok, msg) {
        clearInterval(cycleMonitorInterval);
        cycleMonitorInterval = null;
        if (cycleMonitorPingTimeout) { clearTimeout(cycleMonitorPingTimeout); cycleMonitorPingTimeout = null; }
        phase = 'done';
        window.retryWittypiCyclePing = null;

        const ts = fmtUTC(new Date());
        statusEl.remove();
        const reconnectHint = document.getElementById('cycle-reconnect');
        if (reconnectHint) reconnectHint.remove();
        output.insertAdjacentHTML('beforeend', `<br>[${ts}] ${ok
            ? '<b style="color:green;">✔ PASS</b>'
            : '<b style="color:red;">✘ FAIL</b>: '}${msg}<hr>`);

        scrollToBottom();

        if (ok && runningAll && runningTestBtn) {
            if (runningAll) allTestResults += `<br>         → WittyPi cycle: PASS`;
            const runTestButtons = [...document.querySelectorAll('.run-test-btn:not(.run-all-btn)')];
            runningTestBtn = runTestButtons[runTestButtons.indexOf(runningTestBtn) + 1] || null;
            if (runningTestBtn) {
                setTimeout(() => {
                    runningTestBtn.disabled = false;
                    runningTestBtn.click();
                    runningTestBtn.disabled = true;
                }, 2000);
            } else {
                initTestButtonStates();
                output.insertAdjacentHTML('beforeend', `<br>[${ts}] <b style="color:green;">🙌 SUCCESS: </b>${allTestResults}`);
            }
        } else {
            initTestButtonStates();
        }
    }
}

/* =========================================================
   MPPT — PANEL DISCONNECTED PROMPT
   Shows when VPV = 0. Asks user if panel is connected
   (e.g. it's night). Auto-passes after 30s with no reply.
========================================================= */

function showPanelDisconnectedPrompt(data, output) {
    let countdown = 30;

    output.insertAdjacentHTML('beforeend', `
        <br><div id="mppt-panel-prompt" style="background:#333;padding:8px;border-radius:4px;margin-top:4px;">
            <b style="color:orange;">⚠ Panel voltage is 0V — panel may be disconnected.</b><br>
            Is the solar panel physically connected?
            <br>
            <button class="btn btn-sm btn-success me-2" onclick="resolveMpptPrompt(true)">✔ Yes, it's dark outside</button>
            <button class="btn btn-sm btn-danger  me-2" onclick="resolveMpptPrompt(false)">✘ No, panel is not connected</button>
            <span style="color:gray;"> — auto-pass in <b id="mppt-timer">${countdown}</b>s</span>
        </div>`);
    document.documentElement.scrollTop = document.documentElement.scrollHeight;
    output.scrollTop = output.scrollHeight;

    const timerInterval = setInterval(() => {
        countdown--;
        const el = document.getElementById('mppt-timer');
        if (el) el.textContent = countdown;
        if (countdown <= 0) {
            clearInterval(timerInterval);
            resolveMpptPrompt(true, true);  // auto-pass: no user response
        }
    }, 1000);

    window.resolveMpptPrompt = function(connected, auto = false) {
        clearInterval(timerInterval);
        window.resolveMpptPrompt = null;
        const prompt = document.getElementById('mppt-panel-prompt');
        if (prompt) prompt.remove();

        const ts  = fmtUTC(new Date());
        const ok  = connected;
        const msg = auto ? 'no user response within 30s (auto-pass)' : (connected ? 'panel connected (dark outside)' : 'panel not connected');
        output.insertAdjacentHTML('beforeend',
            `<br>[${ts}] ${ok
                ? '<b style="color:green;">✔ PASS</b>'
                : '<b style="color:red;">✘ FAIL</b>'}: Solar MPPT — ${msg}<hr>`);
        document.documentElement.scrollTop = document.documentElement.scrollHeight;
        output.scrollTop = output.scrollHeight;

        if (runningAll && data.summary)
            allTestResults += `<br>         → ${data.summary} (${msg})`;

        if (ok && runningAll && runningTestBtn) {
            const all = [...document.querySelectorAll('.run-test-btn:not(.run-all-btn)')];
            runningTestBtn = all[all.indexOf(runningTestBtn) + 1] || null;
            if (runningTestBtn) {
                setTimeout(() => {
                    runningTestBtn.disabled = false;
                    runningTestBtn.click();
                    runningTestBtn.disabled = true;
                }, 2000);
            } else {
                initTestButtonStates();
                output.insertAdjacentHTML('beforeend', `<br>[${ts}] <b style="color:green;">🙌 SUCCESS: </b>${allTestResults}`);
            }
        } else {
            initTestButtonStates();
        }
    };
}

</script>

{%endblock%}
