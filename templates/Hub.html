{% extends "base.html" %}
{% block title %}Hub{% endblock %}
{% block content %}
<div class="container">
  <!-- Content here -->  
	<H1>Hub Configuration</H1>	
	<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ hub_config }}</pre>
	
	<form action = "{{url_for('write_config')}}" method = "get" style="display: inline;">
		<button type="submit" class="btn btn-primary">Write config</button>
	</form>
	<form action = "{{url_for('update_version')}}" method = "get" style="display: inline;">
		<button type="submit" class="btn btn-primary">Update version</button>
	</form>
	<form action = "{{url_for('init_hub')}}" method = "get" style="display: inline;">
		<button type="submit" class="btn btn-primary">Init Hub</button>
	</form>
	
	{% if output %}
	<div class="mt-3">
		<h4>Output:</h4>
		<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ output }}</pre>
	</div>
	{% endif %}
</div>        
{% endblock %}
