{% extends "base.html" %}
{% block title %}{% endblock %}
{% block content %}
<div class="container">
  <!-- Content here -->  
	<H1>Hub Configuration</H1>	
	<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ hub_config }}</pre>
	
	<form action = "{{url_for('write_config')}}" method = "get" style="display: inline;">
		<button type="submit" class="btn btn-primary">Write config</button>
	</form>
	<form action = "{{url_for('update_version')}}" method = "get" style="display: inline;">
		<button type="submit" class="btn btn-primary">Update version</button>
	</form>
	<form action="/init-hub" method="GET">
		<button type="submit" class="btn btn-primary">Init Hub</button>
	</form>
	<form action="/poweroff" method="GET" onsubmit="return confirm('Are you sure you want to power off the Hub?');">
		<button type="submit" class="btn btn-danger">Poweroff</button>
	</form>
	
	{% if output %}
	<div class="mt-3">
		<h4>Output:</h4>
		<pre class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;">{{ output }}</pre>
	</div>
	{% endif %}
	
	<pre id="display" class="bg-light p-3" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap;"></pre>
	<script>
	var display = document.getElementById('display');
	var xhr = new XMLHttpRequest();
	xhr.open('GET', "{{url_for('stream')}}", true);
	xhr.send();

	setInterval(function() {
		display.textContent = xhr.responseText;
	}, 2000);
	</script>
</div>        
{% endblock %}
