[loggers]
keys=root,MainLogger

[handlers]
keys=consoleHandler,displayHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_MainLogger]
level=INFO
handlers=consoleHandler,displayHandler
qualname=MainLogger
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_displayHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('Log/Display.txt', 'a')

# [handler_fileHandler]
# class=FileHandler
# level=INFO
# formatter=simpleFormatter
# args=('Log/Scanorhize.log', 'a')

[formatter_simpleFormatter]
format=%(asctime)s | %(levelname)-8s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
# format=%(asctime)s | %(levelname)-8s | %(filename)s-%(funcName)s-%(lineno)04d | %(message)s
